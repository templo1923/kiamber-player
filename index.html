<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KIAMBER ENGINE - REPRO</title>
  <link href="https://unpkg.com/video.js@7/dist/video-js.min.css" rel="stylesheet">
</head>
<body style="background:#000; margin:0;">

  <video id="player" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls></video>

  <script src="https://unpkg.com/video.js@7/dist/video.min.js"></script>
  <script src="https://unpkg.com/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.js"></script>

  <script>
    var player = videojs('player');

    // AQUÍ ESTÁ EL TRUCO QUE USAN ELLOS
    player.ready(function() {
      // Forzamos a que el motor HLS use nuestro "disfraz"
      this.tech().hls.xhr.beforeRequest = function(options) {
        options.headers = options.headers || {};
        // Decimos que venimos de Vimeos
        options.headers['Referer'] = 'https://vimeos.net/';
        return options;
      };

      // CARGA EL VIDEO (¡OJO! Asegúrate de que el Token sea nuevo)
      player.src({
        src: 'TU_NUEVO_LINK_M3U8_AQUI',
        type: 'application/x-mpegURL'
      });
    });
  </script>
</body>
</html>
