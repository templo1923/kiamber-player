<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KIAMBER VIP STREAM</title>
  <link href="https://unpkg.com/video.js/dist/video-js.css" rel="stylesheet">
  <style>
    body { background: #000; margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .video-container { width: 100%; max-width: 960px; }
    .video-js { background-color: #000; }
    /* Estilo rojo Kiamber para el botón central */
    .vjs-big-play-centered .vjs-big-play-button { 
        background-color: rgba(229, 9, 20, 0.8) !important; 
        border-color: #E50914 !important;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <video id="kiamber-player" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto">
      <source src="https://vimeos.zip/hls2/03/00007/aibs2c6nsy1h_n/index-v1-a1.m3u8?t=L8cqSIlKhFUyWWAhl-KDIy3DwsU8IHdIV9D2V9mDyVM&s=1773705159&e=43200&v=144257285&srv=s14&i=0.3&sp=0&r=e" type="application/x-mpegURL">
    </video>
  </div>

  <script src="https://unpkg.com/video.js/dist/video.js"></script>
  <script src="https://unpkg.com/videojs-contrib-hls/dist/videojs-contrib-hls.js"></script>

  <script>
    (function() {
      var player = videojs('kiamber-player', {
        html5: {
          vhs: { overrideNative: true },
          nativeAudioTracks: false,
          nativeVideoTracks: false
        }
      });

      // La lógica de intercepción de red que usa GitHub para engañar al Referer
      player.ready(function() {
        var playerInstance = this;
        
        // Configuramos los headers antes de que se dispare la red
        playerInstance.tech().vhs.xhr.beforeRequest = function(options) {
          options.headers = options.headers || {};
          // Aquí le decimos que venimos de Vimeos para que no nos bloquee
          options.headers['Referer'] = 'https://vimeos.net/';
          return options;
        };

        playerInstance.play().catch(function(error) {
           console.log("Reproducción manual requerida.");
        });
      });
    })();
  </script>
</body>
</html>
