<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link href="https://vjs.zencdn.net/7.10.2/video-js.css" rel="stylesheet">
</head>
<body>
  <video id="kiamber-engine" class="video-js vjs-default-skin vjs-16-9" controls></video>

  <script src="https://vjs.zencdn.net/7.10.2/video.min.js"></script>
  <script src="dist/videojs-contrib-hls.js"></script>

  <script>
    // 1. Inicializamos el reproductor
    var player = videojs('kiamber-engine');

    // 2. CONFIGURACIÓN DE INTERCEPCIÓN (Lo que ellos hacen)
    // Esto se ejecuta antes de cada petición de video
    player.ready(function() {
      var handler = this.tech().hls.xhr;
      
      handler.beforeRequest = function(options) {
        // Obligamos al navegador a decir que venimos de Vimeos
        options.headers = options.headers || {};
        options.headers['Referer'] = 'https://vimeos.net/';
        
        // FUNDAMENTO: Eliminamos el 'Origin' para que el servidor no vea que es GitHub
        delete options.headers['Origin'];
        
        return options;
      };
    });

    // 3. Función para cargar cualquier link (Dinámico)
    function cargarVideo(urlM3U8) {
      player.src({
        src: urlM3U8,
        type: 'application/x-mpegURL'
      });
    }
  </script>
</body>
</html>
