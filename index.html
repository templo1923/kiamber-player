<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KIAMBER VIP | GitHub Engine</title>
  <link href="https://vjs.zencdn.net/7.10.2/video-js.css" rel="stylesheet">
</head>
<body style="background:#000; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="width:100%; max-width:960px;">
    <video id="kiamber-video" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto">
      <source src="https://vimeos.zip/hls2/03/00007/aibs2c6nsy1h_n/index-v1-a1.m3u8?t=L8cqSIlKhFUyWWAhl-KDIy3DwsU8IHdIV9D2V9mDyVM&s=1773705159&e=43200&v=144257285&srv=s14&i=0.3&sp=0&r=e" type="application/x-mpegURL">
    </video>
  </div>

  <script src="https://vjs.zencdn.net/7.10.2/video.min.js"></script>
  <script src="https://unpkg.com/videojs-contrib-hls@5.15.0/dist/videojs-contrib-hls.js"></script>

  <script>
    (function() {
      var player = videojs('kiamber-video');

      player.ready(function() {
        // Esta es la configuración técnica que maneja el repo de GitHub para HLS
        // Engañamos al sistema para que crea que el Referer es Vimeos
        this.tech().hls.xhr.beforeRequest = function(options) {
          options.headers = options.headers || {};
          options.headers['Referer'] = 'https://vimeos.net/';
          return options;
        };

        this.play().catch(function(e) {
            console.log("Esperando interacción del usuario...");
        });
      });
    })();
  </script>
</body>
</html>
