<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KIAMBER VIP STREAM</title>
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet">
</head>
<body style="background:#000; margin:0; display:flex; justify-content:center; align-items:center; height:100vh;">

  <div style="width:100%; max-width:960px;">
    <video id="kiamber-player" class="video-js vjs-default-skin vjs-16-9 vjs-big-play-centered" controls preload="auto"></video>
  </div>

  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

  <script>
    var rawUrl = "https://vimeos.zip/hls2/03/00007/aibs2c6nsy1h_n/index-v1-a1.m3u8?t=L8cqSIlKhFUyWWAhl-KDIy3DwsU8IHdIV9D2V9mDyVM&s=1773705159&e=43200&v=144257285&srv=s14&i=0.3&sp=0&r=e";
    
    // USAMOS UN PROXY QUE ELIMINA EL ORIGIN PARA EVITAR EL 403
    var finalUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(rawUrl);

    var player = videojs('kiamber-player', {
        html5: { vhs: { withCredentials: false } }
    });

    player.src({
        src: finalUrl,
        type: 'application/x-mpegURL'
    });

    player.ready(function() {
        // Forzamos el play
        this.play().catch(function(e){ console.log("Click requerido"); });
    });
  </script>
</body>
</html>
